<div class="card-example">
  <h1>{{ mainTitle }}</h1>
  <p>{{ mainDescription }}</p>
  <hr>
  <div>
    <h3 class="static-card__title">Resumo</h3><br>
    <h4 class="static-card__subtitle">Total de dívidas: <div class="static-card__box"><app-skeleton customType="text" width="350px" height="20px"></app-skeleton></div>
    </h4>
  </div>
  <div class="static-card__container">
    @for( card of staticCards; track card) {
    <app-static-mini-card [title]="card.title" [showSkeleton]="true"></app-static-mini-card>
    }
  </div>
  <div class="static-card__details">
    @for (detail of [1]; track detail) {
    <div class="static-card__box--rodape">
      <app-skeleton customType="text" width="350px" height="20px"></app-skeleton>
    </div>
    }
  </div>
  <button type="button" class="btn-example" (click)="callSkeletonTwo()" [disabled]="isProcessing()">Incluir</button>
</div>
<br><br>
