@if (listOffers$ | async; as listOffers) {
  @for (offer of listOffers; track offer.id) {

  @if (offer.status === 'active') {

    <app-card-offer
      [mainTitle]="offer.title"
      [mainDescription]="offer.description"
    >

      @switch (offer.type) {

        @case ('card_offer') {
          <app-card-offer-body />
        }

        @case ('card_animated_split') {
          <app-card-animated-split-body />
        }

        @case ('card_animated_summary') {
          <app-card-animated-summary-body />
        }

      }

    </app-card-offer>

  }
  }
}
