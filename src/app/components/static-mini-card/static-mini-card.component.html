<div class="static-mini-card" id="static-mini-card">
  <h3 class="static-mini-card__title" id="static-mini-card-title">{{ title }}</h3>

  <div class="static-mini-card__subtitle" id="static-mini-card-default">
    <span>{{ subtitle }}</span>
    @if(showSkeleton) {
    <app-skeleton customType="text" width="120px" height="20px"></app-skeleton>
    }
  </div>

</div>
